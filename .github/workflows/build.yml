name: Build BC Predictor EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.24.3
        pip install pandas==2.0.3
        pip install scikit-learn==1.3.2
        pip install joblib==1.4.2
        pip install xgboost==2.1.4
        pip install tqdm==4.66.1
        pip install pyinstaller==6.5.0

    - name: Verify imports
      run: python -c "import pandas as pd, xgboost, sklearn, joblib; print(f'pandas {pd.__version__}, xgboost {xgboost.__version__}')"

    - name: Build EXE
      run: |
        pyinstaller --onefile --console --name BC_Predictor `
          --hidden-import=sklearn `
          --hidden-import=xgboost `
          --hidden-import=joblib `
          --hidden-import=numpy `
          --hidden-import=pandas `
          --hidden-import=tkinter `
          --add-data "xgb_best_model.pkl;." `
          --add-data "feature_names.pkl;." `
          bc_predict.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: BC_Predictor
        path: dist/BC_Predictor.exe
