name: Build Windows EXE

on:
  push:
    branches: [ "main" ]      # 当你推送到 main 分支时触发
  workflow_dispatch:          # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'   # 与本地训练环境一致

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas xgboost scikit-learn joblib pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller bc_predict.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BC_Predictor_Windows
        path: dist/BC_Predictor.exe
